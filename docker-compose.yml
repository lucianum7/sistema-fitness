services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5435}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sistema-fitness}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sistema-fitness_local_password}
      POSTGRES_DB: ${POSTGRES_DB:-sistema-fitness}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sistema-fitness} -d ${POSTGRES_DB:-sistema-fitness}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      initialize:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sistema-fitness}:${POSTGRES_PASSWORD:-sistema-fitness_local_password}@postgres:5432/${POSTGRES_DB:-sistema-fitness}?schema=public
      BACKUP_DIR: /app/backups
    volumes:
      - backups:/app/backups
    expose:
      - "3000"

  initialize:
    build:
      context: .
      target: initializer
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-sistema-fitness}:${POSTGRES_PASSWORD:-sistema-fitness_local_password}@postgres:5432/${POSTGRES_DB:-sistema-fitness}?schema=public

  nginx:
    image: nginx:1.29-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ops/certbot/www:/var/www/certbot
      - ./ops/certbot/conf:/etc/letsencrypt

volumes:
  postgres_data:
  backups:
